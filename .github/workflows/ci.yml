name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          # Placeholders — o build não faz rede; só precisa das vars existirem.
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy
          WEBHOOK_VERIFY_TOKEN: dummy
          CRON_SECRET: dummy
          APP_URL: https://example.com
